name: pickup
description: "A futuristic smart diary application."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  intl: ^0.19.0
  google_generative_ai: ^0.4.6
  http: ^1.2.0
  share_plus: ^10.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.3
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/branding/pickuplogo.jpg
    - assets/branding/pickuplogo.png

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
