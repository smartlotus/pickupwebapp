<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Pickup iOS 安装指南</title>
  <style>
    :root {
      --bg: #0f0f13;
      --card: #1a1a22;
      --text: #f4f4f8;
      --muted: #ababba;
      --accent: #9d7bff;
      --accent-2: #3db7ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 8%, rgba(157, 123, 255, 0.28), transparent 38%),
        radial-gradient(circle at 88% 22%, rgba(61, 183, 255, 0.25), transparent 34%),
        var(--bg);
      padding: env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px 8px 24px;
    }

    .hero {
      padding: 18px;
      border-radius: 16px;
      background: linear-gradient(135deg, #24213a, #181825);
      border: 1px solid rgba(157, 123, 255, 0.35);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.28);
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0.01em;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.97rem;
    }

    .steps {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .step {
      border-radius: 12px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 12px;
    }

    .num {
      display: inline-block;
      min-width: 24px;
      padding: 2px 8px;
      border-radius: 20px;
      margin-right: 8px;
      background: rgba(157, 123, 255, 0.22);
      color: #d9ceff;
      font-size: 0.84rem;
      text-align: center;
      vertical-align: middle;
    }

    .tips {
      margin-top: 14px;
      border-radius: 12px;
      padding: 12px;
      background: rgba(61, 183, 255, 0.1);
      border: 1px solid rgba(61, 183, 255, 0.28);
      color: #d6f1ff;
      line-height: 1.45;
      font-size: 0.93rem;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, #9d7bff, #7a9bff);
      color: white;
    }

    .btn-secondary {
      background: #262836;
      color: #dddaf7;
      border: 1px solid rgba(255, 255, 255, 0.14);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>在 iPhone 上安装 Pickup（无需 App Store）</h1>
      <p class="sub">
        Pickup 已支持 PWA。你可以直接从 Safari “添加到主屏幕”，安装后会以接近原生 App 的全屏方式启动。
      </p>
    </section>

    <section class="steps">
      <div class="step"><span class="num">1</span>用 iPhone 的 <strong>Safari</strong> 打开 Pickup 网址。</div>
      <div class="step"><span class="num">2</span>点击底部 <strong>分享</strong> 按钮（方框+上箭头）。</div>
      <div class="step"><span class="num">3</span>在菜单中选择 <strong>添加到主屏幕</strong>。</div>
      <div class="step"><span class="num">4</span>确认名称后点 <strong>添加</strong>，回到桌面点击图标即可使用。</div>
    </section>

    <section class="tips">
      提示：首次打开建议保持网络通畅以完成资源缓存。后续再次打开时，已缓存内容可离线访问。
    </section>

    <section class="actions">
      <a class="btn btn-primary" href="./">返回 Pickup</a>
      <button class="btn btn-secondary" id="copy-link" type="button">复制当前页面链接</button>
    </section>
  </main>

  <script>
    const btn = document.getElementById('copy-link');
    if (btn) {
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(window.location.href);
          btn.textContent = '已复制';
        } catch (_) {
          btn.textContent = '复制失败';
        }
      });
    }
  </script>
</body>
</html>
