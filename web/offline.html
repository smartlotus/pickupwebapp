<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>Pickup Offline</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #121212;
      color: #e6e6ef;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #1c1c24;
      padding: 18px;
    }
    p {
      color: #aeb2bf;
      line-height: 1.5;
      margin-bottom: 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Pickup is offline</h2>
    <p>Reconnect once to refresh resources, then reopen from Home Screen for cached usage.</p>
  </div>
</body>
</html>
